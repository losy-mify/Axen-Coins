def read_navbar_balance(sb) -> int:
    try:
        bal = sb.execute_script("""
            (function(){
                var els = document.querySelectorAll('.credit-balance');
                for (var i = 0; i < els.length; i++) {
                    var t = els[i].textContent.trim();
                    var m = t.match(/(\d+)\s*$/);
                    if (m) return parseInt(m[1]);
                }
                return -1;
            })()
        """)
        return bal if bal is not None else -1
    except Exception:
        return -1

def read_claims_remaining(sb) -> int:
    try:
        val = sb.execute_script("""
            (function(){
                var spans = document.querySelectorAll('span');
                for (var i = 0; i < spans.length; i++) {
                    var m = spans[i].textContent.trim().match(/^(\d+)\/5\s*claims$/);
                    if (m) return parseInt(m[1]);
                }
                return -1;
            })()
        """)
        return val if val is not None else -1
    except Exception:
        return -1

def read_refill_delay_minutes(sb, default=65):
    """尝试从页面元素动态读取 Refill 冷却剩余时间，并默认加 5 分钟缓冲"""
    try:
        cooldown = sb.execute_script("""
            (function(){
                var els = document.querySelectorAll('.status-pill');
                for (var i = 0; i < els.length; i++) {
                    var t = els[i].textContent.trim();
                    if (t.indexOf('Refill in') !== -1) return t;
                }
                return null;
            })()
        """)
        if cooldown:
            m = re.search(r'Refill in\s+(\d{1,2}):(\d{2})', cooldown)
            if m:
                minutes = int(m.group(1))
                print(f"⏱️ 页面检测到冷却剩余: {minutes} 分钟")
                return minutes + 5
    except Exception as e:
        print(f"⚠️ 读取冷却时间失败，将使用默认值 {default} 分钟: {e}")
    return default

def return_to_claim_if_redirected(sb):
    print("⏳ 等待页面跳转到 Credits 页面...")
    for _ in range(30):
        time.sleep(0.5)
        try:
            url = sb.get_current_url()
        except Exception:
            continue
        if '/credits' in url:
            print("✅ 已跳转到 Credits 页面...")
            for _ in range(15):
                clicked = sb.execute_script("""
                    (function(){
                        var links = document.querySelectorAll('a[href="/claim"]');
                        for (var i = 0; i < links.length; i++) {
                            if (links[i].offsetParent !== null) {
                                links[i].click();
                                return true;
                            }
                        }
                        return false;
                    })()
                """)
                if clicked:
                    print("✅ 已点击 Claim，返回 Claim 页面...")
                    time.sleep(3)
                    return
                time.sleep(0.5)
            print("⚠️ 未找到 /claim 卡片链接")
            return
    print("⚠️ 等待跳转超时")


# ============================================================
# Claim
# ============================================================

def do_claim(sb):
    # 余额阈值：500~600 随机
    threshold = random.randint(500, 600)
    print(f"💡 本次余额阈值：{threshold}")

    print("🪙 导航到 Claim 页面...")
    sb.open(URL_CLAIM)
    time.sleep(3)
    dismiss_consent_banner(sb)

    balance = read_navbar_balance(sb)
    print(f"💰 当前余额：{balance}")

    # 超过阈值直接跳过
    if balance >= threshold:
        print(f"⏭ 余额 {balance} 已超过阈值 {threshold}，跳过领取")
        delay = read_refill_delay_minutes(sb, default=65)
        return "⌛️ 期限未至", balance, delay

    # 检测冷却（0/5 claims 且有倒计时）
    cooldown = sb.execute_script("""
        (function(){
            var els = document.querySelectorAll('.status-pill');
            for (var i = 0; i < els.length; i++) {
                var t = els[i].textContent.trim();
                if (t.indexOf('Refill in') !== -1) return t;
            }
            return null;
        })()
    """)
    if cooldown:
        print(f"⏳ Claim 冷却中：{cooldown}")
        m = re.search(r'Refill in\s+(\d{1,2}):(\d{2})', cooldown)
        if m:
            minutes = int(m.group(1))
            seconds = int(m.group(2))
            total_wait_seconds = minutes * 60 + seconds
            if total_wait_seconds < 300:
                print(f"⏳ 冷却时间少于 5 分钟，等待 {total_wait_seconds} 秒至倒计时结束...")
                time.sleep(total_wait_seconds + 3)  # 多加 3 秒作为缓冲时间
                print("🔄 倒计时结束，刷新页面继续...")
                sb.refresh()
                time.sleep(3)
                dismiss_consent_banner(sb)
            else:
                return "⌛️ 期限未至", balance, minutes + 5
        else:
            return "⌛️ 期限未至", balance, 65

    attempt = 0
    success = False

    while True:
        attempt += 1
        print(f"\n--- Claim 第 {attempt} 次 ---")

        claims_remaining = read_claims_remaining(sb)
        print(f"📊 剩余 Claims：{claims_remaining}/5")

        if claims_remaining == 0:
            print("✅ Claims 已全部领取完成")
            break

        # 清空上一次残留的 token
        reset_token_cache(sb)

        # 注入 Turnstile 监听器
        try:
            sb.execute_script(INJECT_TOKEN_LISTENER_JS)
            print("📡 Turnstile 监听器已注入")
        except Exception as e:
            print(f"⚠️ 监听器注入失败：{e}")

        # 等待 Turnstile 就绪并求解
        print("⏳ 等待 Turnstile 验证组件...")
        for _ in range(15):
            if turnstile_exists(sb):
                print("✅ 验证组件就绪")
                break
            time.sleep(1)

        if turnstile_exists(sb):
            if not solve_turnstile(sb, label=f'_claim_{attempt}'):
                print(f"❌ Claim {attempt} Turnstile 验证失败，跳出")
                sb.save_screenshot(f"claim_turnstile_fail_{attempt}.png")
                break
        else:
            print("⚠️ 未检测到验证组件，直接尝试点击")

        # 等待 Claim 按钮解锁
        print("⏳ 等待 Claim 按钮解锁...")
        btn_unlocked = False
        for _ in range(40):
            btn_ok = sb.execute_script("""
                (function(){
                    var btns = document.querySelectorAll('button');
                    for (var i = 0; i < btns.length; i++) {
                        var t = btns[i].textContent.trim();
                        if (t.indexOf('Claim') !== -1 && t.indexOf('credits') !== -1
                            && !btns[i].disabled
                            && !btns[i].classList.contains('disabled')) {
                            return true;
                        }
                    }
                    return false;
                })()
            """)
            if btn_ok:
                btn_unlocked = True
                break
            time.sleep(0.5)

        if not btn_unlocked:
            print("❌ Claim 按钮未解锁，跳出")
            break

        # 点击 Claim 按钮
        print("📤 点击 Claim 按钮...")
        sb.execute_script("""
            (function(){
                var btns = document.querySelectorAll('button');
                for (var i = 0; i < btns.length; i++) {
                    var t = btns[i].textContent.trim();
                    if (t.indexOf('Claim') !== -1 && t.indexOf('credits') !== -1) {
                        btns[i].click();
                        break;
                    }
                }
            })()
        """)

        # 等待自然跳转到 /credits，再点卡片链接回 /claim
        return_to_claim_if_redirected(sb)

        new_claims = read_claims_remaining(sb)
        print(f"📊 剩余 Claims：{new_claims}/5")

        if new_claims != -1 and new_claims < claims_remaining:
            success = True

        if new_claims == 0:
            print("✅ Claims 已全部领取完成")
            break

    # 循环结束后，动态读取新的倒计时用于延迟
    final_delay_minutes = read_refill_delay_minutes(sb, default=65)

    final_balance = read_navbar_balance(sb)
    print(f"💰 最终余额：{final_balance}")

    status = "✅ 领取成功" if success else "❌ 领取失败"
    return status, final_balance, final_delay_minutes


# ============================================================
# 动态修改 cron-job.org 下次执行时间
# ============================================================

def update_cronjob_schedule(delay_minutes=65):
    import json
    import datetime
    try:
        cron_job_env = os.environ.get("CRON_JOB")
        if not cron_job_env or "," not in cron_job_env:
            print("⚠️ 未配置 CRON_JOB 环境变量或格式不正确（应为: API_Key,ID），跳过修改调度")
            return

        _cron_parts = cron_job_env.split(",")
        api_key = _cron_parts[0].strip()
        job_id = _cron_parts[1].strip()

        now_utc = datetime.datetime.utcnow()
        next_run = now_utc + datetime.timedelta(minutes=delay_minutes)
        
        next_hour = next_run.hour
        next_minute = next_run.minute

        url = f"https://api.cron-job.org/jobs/{job_id}"
        headers = {
            "Authorization": f"Bearer {api_key}",
            "Content-Type": "application/json"
        }

        data = {
            "job": {
                "schedule": {
                    "timezone": "UTC",
                    "expiresAt": 0,
                    "hours": [next_hour],
                    "minutes": [next_minute],
                    "mdays": [-1],
                    "months": [-1],
                    "wdays": [-1]
                }
            }
        }

        payload = json.dumps(data).encode('utf-8')
        req = urllib.request.Request(url, data=payload, headers=headers, method="PATCH")
        
        with urllib.request.urlopen(req, timeout=15) as resp:
            print(f"🔄 成功将任务推迟 {delay_minutes} 分钟，下次触发时间: UTC {next_hour:02d}:{next_minute:02d}")
            
    except Exception as e:
        print(f"⚠️ 修改 cron-job.org 失败: {e}")


# ============================================================
# 主流程
# ============================================================

def run_script():
    with SB(uc=True, test=True, proxy=LOCAL_PROXY, maximize=True) as sb:
        print("🔧 启动浏览器...")
        print("🚀 浏览器就绪！")

        # ── IP 验证 ──────────────────────────────────────────
        print("🌐 验证出口IP...")
        try:
            sb.open("https://api.ipify.org/?format=json")
            dismiss_consent_banner(sb)
            import re as _re
            ip_text = sb.get_text('body')
            ip_text = _re.sub(r'(\d+\.\d+\.)\d+\.\d+', r'\1**.**', ip_text)
            print(f"✅ 出口IP确认：{ip_text}")
        except Exception:
            print("⚠️ IP验证超时，跳过")

        # ── 登录 ─────────────────────────────────────────────
        print("🔑 打开登录页面...")
        sb.uc_open_with_reconnect(URL_LOGIN, reconnect_time=4)
        time.sleep(3)
        dismiss_consent_banner(sb)

        # ── 登录页 Turnstile ──────────────────────────────────
        print("⏳ 等待验证组件...")
        for _ in range(15):
            if turnstile_exists(sb):
                print("✅ 验证组件就绪")
                break
            time.sleep(1)

        if turnstile_exists(sb):
            if not solve_turnstile(sb, label='_login'):
                sb.save_screenshot("login_turnstile_fail.png")
                send_tg(-1, "❌ 登录页Turnstile验证失败")
                return
        else:
            print("⚠️ 未检测到验证组件，直接提交")

        # ── 填写邮箱密码 ──────────────────────────────────────
        print("✏️ 填写邮箱密码...")
        try:
            sb.wait_for_element_visible("input[type='email']", timeout=20)
            sb.type("input[type='email']", EMAIL)
            sb.type("input[type='password']", PASSWORD)
        except Exception:
            print("❌ 登录框加载失败")
            sb.save_screenshot("login_form_fail.png")
            return

        # ── 等待登录按钮解锁并提交 ────────────────────────────
        print("⏳ 等待登录按钮解锁...")
        for _ in range(40):
            btn_ok = sb.execute_script("""
                (function(){
                    var btns = document.querySelectorAll('button');
                    for (var i = 0; i < btns.length; i++) {
                        if (btns[i].textContent.trim().indexOf('Sign In') !== -1 && !btns[i].disabled) {
                            return true;
                        }
                    }
                    return false;
                })()
            """)
            if btn_ok:
                break
            time.sleep(0.5)
        else:
            sb.execute_script("""
                var btns = document.querySelectorAll('button');
                for (var i = 0; i < btns.length; i++) {
                    if (btns[i].textContent.trim().indexOf('Sign In') !== -1) {
                        btns[i].disabled = false;
                        btns[i].removeAttribute('disabled');
                        btns[i].classList.remove('disabled');
                        break;
                    }
                }
            """)
            time.sleep(0.5)

        print("📤 提交登录请求...")
        try:
            sb.execute_script("""
                var btns = document.querySelectorAll('button');
                for (var i = 0; i < btns.length; i++) {
                    if (btns[i].textContent.trim().indexOf('Sign In') !== -1) {
                        btns[i].click();
                        break;
                    }
                }
            """)
        except Exception as e:
            print(f"❌ 登录按钮点击失败：{e}")
            sb.save_screenshot("login_submit_fail.png")
            return

        print("⏳ 等待登录跳转...")
        for _ in range(40):
            try:
                url = sb.get_current_url()
                if "/login" not in url and "axenthost.com" in url:
                    print(f"✅ 登录成功！")
                    break
            except Exception:
                pass
            time.sleep(0.5)
        else:
            print("❌ 登录等待超时")
            sb.save_screenshot("login_timeout.png")
            send_tg(-1, "❌ 登录失败")
            return

        # ── Spin 环节 ─────────────────────────────────────────
        spin_status = do_spin(sb)

        # ── Claim 环节 ────────────────────────────────────────
        # 接收返回值中的 delay_minutes
        claim_status, final_balance, delay_minutes = do_claim(sb)

        send_tg(final_balance, claim_status)
        
        # ── 任务结束，使用动态提取的时间修改调度 ──────────────
        update_cronjob_schedule(delay_minutes=delay_minutes)


if __name__ == "__main__":
    run_script()
