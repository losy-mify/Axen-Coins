def dismiss_consent_banner(sb):
    try:
        sb.execute_script("""
            (function(){
                var btns = document.querySelectorAll('button.ncmp__btn');
                for (var i = 0; i < btns.length; i++) {
                    var attr = btns[i].getAttribute('onclick') || '';
                    if (attr.indexOf("'save'") !== -1 || attr.indexOf('"save"') !== -1) {
                        btns[i].click();
                        return;
                    }
                }
            })();
        """)
    except Exception:
        pass


# ============================================================
# Turnstile 工具函数
# ============================================================

EXPAND_POPUP_JS = """
(function() {
    var turnstileInput = document.querySelector('input[name="cf-turnstile-response"]');
    if (!turnstileInput) return;
    var el = turnstileInput;
    for (var i = 0; i < 20; i++) {
        el = el.parentElement;
        if (!el) break;
        var style = window.getComputedStyle(el);
        if (style.overflow === 'hidden' || style.overflowX === 'hidden' || style.overflowY === 'hidden') {
            el.style.overflow = 'visible';
        }
        el.style.minWidth = 'max-content';
    }
})();
"""

INJECT_TOKEN_LISTENER_JS = """
(function() {
    if (window.__cf_token_listener_injected__) return;
    window.__cf_token_listener_injected__ = true;
    window.__cf_turnstile_token__ = '';

    window.addEventListener('message', function(e) {
        try {
            var d = e.data;
            if (!d || typeof d !== 'object') return;
            if (d.event === 'food') return;
            var token = d.token || d.response;
            if (token && token.length > 20) {
                window.__cf_turnstile_token__ = token;
                var inputs = document.querySelectorAll(
                    'input[name="cf-turnstile-response"], input[name="cf_turnstile_response"]'
                );
                for (var i = 0; i < inputs.length; i++) {
                    try {
                        var nativeSet = Object.getOwnPropertyDescriptor(
                            HTMLInputElement.prototype, 'value'
                        ).set;
                        nativeSet.call(inputs[i], token);
                        inputs[i].dispatchEvent(new Event('input',  {bubbles: true}));
                        inputs[i].dispatchEvent(new Event('change', {bubbles: true}));
                    } catch(err) {
                        inputs[i].value = token;
                    }
                }
            }
        } catch(err) {}
    });
})();
"""

READ_CAPTURED_TOKEN_JS = """
(function(){ return window.__cf_turnstile_token__ || ''; })()
"""

GET_COORDS_JS = """
(function() {
    var anchor = document.querySelector('input[name="cf-turnstile-response"]');
    if (anchor) {
        var rect = anchor.parentElement.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) {
            return {
                viewport_x: Math.round(rect.left + rect.width / 2) - 130,
                viewport_y: Math.round(rect.top  + rect.height / 2),
                win_x:    window.screenX || 0,
                win_y:    window.screenY || 0,
                outer_h:  window.outerHeight,
                inner_h:  window.innerHeight,
                outer_w:  window.outerWidth,
                inner_w:  window.innerWidth
            };
        }
    }
    return null;
})()
"""


def xdotool_click(x, y):
    x, y = int(x), int(y)
    try:
        result = subprocess.run(
            ["xdotool", "search", "--onlyvisible", "--class", "chrome"],
            capture_output=True, text=True, timeout=3
        )
        wids = [w for w in result.stdout.strip().split('\n') if w]
        if wids:
            subprocess.run(["xdotool", "windowactivate", wids[-1]],
                           timeout=2, stderr=subprocess.DEVNULL)
            time.sleep(0.2)
        subprocess.run(["xdotool", "mousemove", str(x), str(y), "click", "1"],
                       timeout=2, check=True)
        print(f"📐 坐标点击成功")
        return True
    except Exception as e:
        print(f"⚠️ xdotool点击失败：{e}")
        return False


def get_turnstile_coords(sb):
    for _ in range(20):
        result = sb.execute_script(GET_COORDS_JS)
        if result:
            vp_x    = result['viewport_x']
            vp_y    = result['viewport_y']
            win_x   = result['win_x']
            win_y   = result['win_y']
            toolbar = result['outer_h'] - result['inner_h']
            if not (30 <= toolbar <= 200):
                toolbar = 87
            border  = (result['outer_w'] - result['inner_w']) / 2 \
                      if result['outer_w'] > result['inner_w'] else 0
            abs_x   = int(vp_x + win_x + border)
            abs_y   = int(vp_y + win_y + toolbar)
            print(f"📐 坐标计算完成")
            return abs_x, abs_y
        time.sleep(0.5)
    return None, None


def check_token(sb) -> bool:
    try:
        if sb.execute_script("""
            (function(){
                var input = document.querySelector('input[name="cf-turnstile-response"]');
                return input && input.value && input.value.length > 20;
            })()
        """):
            return True
    except Exception:
        pass
    try:
        token = sb.execute_script(READ_CAPTURED_TOKEN_JS)
        if token and len(token) > 20:
            return True
    except Exception:
        pass
    return False


def get_token_value(sb) -> str:
    try:
        token = sb.execute_script(READ_CAPTURED_TOKEN_JS)
        if token and len(token) > 20:
            return token
    except Exception:
        pass
    try:
        token = sb.execute_script("""
            (function(){
                var input = document.querySelector('input[name="cf-turnstile-response"]');
                return (input && input.value) ? input.value : '';
            })()
        """)
        if token and len(token) > 20:
            return token
    except Exception:
        pass
    return ''


def turnstile_exists(sb) -> bool:
    try:
        return sb.execute_script(
            "(function(){ return document.querySelector('input[name=\"cf-turnstile-response\"]') !== null; })()"
        )
    except Exception:
        return False


def reset_token_cache(sb):
    try:
        sb.execute_script("""
            window.__cf_token_listener_injected__ = false;
            window.__cf_turnstile_token__ = '';
            var inputs = document.querySelectorAll(
                'input[name="cf-turnstile-response"], input[name="cf_turnstile_response"]'
            );
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].value = '';
            }
        """)
        print("🧹 已清空上次 token 缓存")
    except Exception as e:
        print(f"⚠️ 清空token失败：{e}")


def solve_turnstile(sb, label='') -> bool:
    for _ in range(3):
        sb.execute_script(EXPAND_POPUP_JS)
        time.sleep(0.5)

    try:
        sb.execute_script(INJECT_TOKEN_LISTENER_JS)
        print("📡 开始监控Cloudflare Turnstile Token...")
    except Exception as e:
        print(f"⚠️ 监听器注入失败：{e}")

    if check_token(sb):
        print("✅ 验证已自动通过")
        return True

    sb.execute_script("""
        var anchor = document.querySelector('input[name="cf-turnstile-response"]');
        if (anchor && anchor.parentElement) {
            anchor.parentElement.scrollIntoView({behavior:'smooth', block:'center'});
        }
    """)
    time.sleep(1.5)

    abs_x, abs_y = get_turnstile_coords(sb)
    if abs_x is None:
        print("❌ 验证坐标获取失败")
        sb.save_screenshot(f"turnstile_no_coords{label}.png")
        return False

    win_info = sb.execute_script("""
        (function(){
            return {
                sx: window.screenX || 0,
                sy: window.screenY || 0,
                toolbar: window.outerHeight - window.innerHeight,
                border: (window.outerWidth - window.innerWidth) / 2
            };
        })()
    """)
    toolbar = win_info['toolbar'] if 30 <= win_info['toolbar'] <= 200 else 87
    dot_vp_x = int(abs_x - win_info['sx'] - win_info['border'])
    dot_vp_y = int(abs_y - win_info['sy'] - toolbar)

    sb.execute_script(f"""
        (function(){{
            var old = document.getElementById('__click_marker__');
            if (old) old.remove();
            var dot = document.createElement('div');
            dot.id = '__click_marker__';
            dot.style.cssText =
                'position:fixed;left:{dot_vp_x - 12}px;top:{dot_vp_y - 12}px;' +
                'width:24px;height:24px;' +
                'background:red;border-radius:50%;' +
                'z-index:2147483647;pointer-events:none;opacity:0.85;';
            document.body.appendChild(dot);
        }})()
    """)
    time.sleep(0.3)
    sb.save_screenshot(f"turnstile_before_click{label}.png")

    sb.execute_script("var d=document.getElementById('__click_marker__'); if(d) d.remove();")
    xdotool_click(abs_x, abs_y)
    time.sleep(0.5)
    sb.save_screenshot(f"turnstile_after_click{label}.png")

    for _ in range(40):
        time.sleep(0.5)
        if check_token(sb):
            token = get_token_value(sb)
            print(f"✅ Cloudflare Turnstile 验证通过！token：{token[:50]}...")
            return True

    print("❌ 人机验证超时")
    sb.save_screenshot(f"turnstile_timeout{label}.png")
    return False


