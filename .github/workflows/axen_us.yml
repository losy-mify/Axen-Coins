def do_spin(sb) -> str:
    print("🎰 导航到 Spin 页面...")
    sb.open(URL_SPIN)
    time.sleep(10)
    dismiss_consent_banner(sb)

    # 检测冷却时间
    cooldown = sb.execute_script("""
        (function(){
            var spans = document.querySelectorAll('span');
            for (var i = 0; i < spans.length; i++) {
                var t = spans[i].textContent.trim();
                if (/^\d{1,2}:\d{2}:\d{2}$/.test(t)) {
                    return t;
                }
            }
            return null;
        })()
    """)
    if cooldown:
        print(f"⏳ Spin 冷却中，剩余：{cooldown}，跳过")
        return f"⏳ 冷却中 ({cooldown})"

    # 找 Spin 按钮
    print("🔍 查找 Spin 按钮...")
    sb.save_screenshot("spin_page_loaded.png")
    for attempt_i in range(15):
        spin_found = sb.execute_script("""
            (function(){
                return document.querySelector('div.spin') !== null;
            })()
        """)
        if spin_found:
            print("✅ 找到 Spin 按钮")
            break
        time.sleep(1)
    else:
        print("❌ 未找到 Spin 按钮")
        sb.save_screenshot("spin_no_btn.png")
        return "❌ 未找到Spin按钮"

    print("📤 点击 Spin...")
    sb.execute_script("""
        var btn = document.querySelector('div.spin');
        if (btn) btn.click();
    """)

    # 等待结果
    print("⏳ 等待 Spin 结果...")
    for _ in range(40):
        time.sleep(0.5)
        result = sb.execute_script("""
            (function(){
                var els = document.querySelectorAll('div');
                for (var i = 0; i < els.length; i++) {
                    if (els[i].textContent.indexOf('You won') !== -1
                            && els[i].textContent.indexOf('credits') !== -1) {
                        return els[i].textContent.trim();
                    }
                }
                return null;
            })()
        """)
        if result:
            m = re.search(r'You won\s+(\d+)\s+credits', result)
            credits = m.group(1) if m else '?'
            print(f"🎉 Spin 结果：获得 {credits} credits！")
            return f"✅ 获得 {credits} credits"

    print("⚠️ 未能读取 Spin 结果")
    sb.save_screenshot("spin_no_result.png")
    return "⚠️ 结果未知"


