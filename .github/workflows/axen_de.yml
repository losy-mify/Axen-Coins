name: Axen-DE
on:
  workflow_dispatch:
jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Axen-Coins-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚙ 设置代理 (sing-box)
        id: singbox
        env:
          NODE_LINK: ${{ secrets.DE_PROXY }}
        run: |
          # bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
          ATTEMPTS=("🔌 启动代理..." "🔄 二启动代理..." "🆘 三启代理...")
          FAILURES=("❌ 启动失败" "❌ 二启失败" "💀 三启失败")
          for i in 0 1 2; do
            echo "${ATTEMPTS[$i]}"
            bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh) && exit 0
            echo "${FAILURES[$i]}"
          done
          exit 1

      - name: 🛠️ 安装系统依赖
        if: ${{ steps.singbox.outcome == 'success' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        if: ${{ steps.singbox.outcome == 'success' }}
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        if: ${{ steps.singbox.outcome == 'success' }}
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.DE_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.DE_CRON }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
